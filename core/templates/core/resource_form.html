{% extends 'core/base.html' %}

{% block title %}Add Resource{% endblock %}

{% block content %}
<div class="min-h-screen py-12 px-4 md:px-12 lg:px-16 max-w-3xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'admin_dashboard' %}" class="text-secondary hover:underline">← Back to Dashboard</a>
        <h1 class="font-display-lg text-3xl md:text-4xl text-secondary font-['EB_Garamond']">Add Resource</h1>
    </div>

    <div class="glass-card p-8 md:p-12 rounded-3xl">
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="font-label-caps text-xs text-secondary block mb-2">TITLE *</label>
                <input type="text" name="title" required 
                       class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none">
            </div>

            <div>
                <label class="font-label-caps text-xs text-secondary block mb-2">DESCRIPTION</label>
                <textarea name="description" rows="4" 
                          class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none"></textarea>
            </div>

            <div>
                <label class="font-label-caps text-xs text-secondary block mb-2">FILE TYPE *</label>
                <select name="file_type" required 
                        class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none appearance-none">
                    <option value="" class="bg-surface-container-high">Select Type</option>
                    <option value="pdf" class="bg-surface-container-high">PDF</option>
                    <option value="video" class="bg-surface-container-high">Video</option>
                    <option value="link" class="bg-surface-container-high">Link</option>
                    <option value="document" class="bg-surface-container-high">Document</option>
                </select>
            </div>

            <div>
                <label class="font-label-caps text-xs text-secondary block mb-2">UPLOAD FILE</label>
                <input type="file" name="file_upload" 
                       class="w-full cursor-pointer text-on-surface-variant file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:bg-secondary file:text-on-secondary file:font-bold file:cursor-pointer hover:file:shadow-[0_0_20px_rgba(233,193,118,0.4)]">
                <p class="text-on-surface-variant text-xs mt-2">Optional - Upload a file</p>
            </div>

            <div>
                <label class="font-label-caps text-xs text-secondary block mb-2">FILE URL</label>
                <input type="url" name="file_url" 
                       class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none"
                       placeholder="https://example.com/resource">
                <p class="text-on-surface-variant text-xs mt-2">Optional - Enter a URL (e.g., YouTube link)</p>
            </div>

            <button type="submit" 
                    class="w-full bg-secondary text-on-secondary py-4 rounded-xl font-label-caps text-sm font-bold tracking-[0.2em] hover:shadow-[0_0_30px_rgba(233,193,118,0.4)] transition-all">
                ADD RESOURCE
            </button>
        </form>
    </div>
</div>
{% endblock %}
