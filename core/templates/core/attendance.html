{% extends 'core/base.html' %}

{% block title %}Manage Attendance{% endblock %}

{% block content %}
<div class="min-h-screen py-12 px-4 md:px-12 lg:px-16 max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
        <h1 class="font-display-lg text-3xl md:text-4xl text-secondary font-['EB_Garamond']">Manage Attendance</h1>
        <a href="{% url 'admin_dashboard' %}" class="glass-card px-6 py-3 rounded-full text-sm hover:border-secondary transition-all">Back</a>
    </div>

    <div class="glass-card p-8 rounded-2xl">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="font-label-caps text-xs text-secondary block mb-2">DATE</label>
                    <input type="date" name="date" value="{{ today|date:'Y-m-d' }}" required 
                           class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none">
                </div>
                <div>
                    <label class="font-label-caps text-xs text-secondary block mb-2">CLASS</label>
                    <select name="class_name" required 
                            class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none appearance-none">
                        <option value="" class="bg-surface-container-high">Select Class</option>
                        {% for class in classes %}
                        <option value="{{ class.name }}" class="bg-surface-container-high">{{ class.name }} - {{ class.section }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div id="attendance-list" class="mt-6">
                <!-- Students will be loaded here via JavaScript -->
            </div>

            <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 text-on-surface-variant">
                    <input type="checkbox" name="send_sms" class="rounded border-white/10 bg-surface-container-highest/30">
                    Send SMS to absent students
                </label>
            </div>

            <button type="submit" 
                    class="bg-secondary text-on-secondary px-8 py-4 rounded-xl font-label-caps text-sm font-bold hover:shadow-[0_0_20px_rgba(233,193,118,0.4)] transition-all">
                Save Attendance
            </button>
        </form>
    </div>
</div>

<script>
    // Load students when class is selected
    document.querySelector('select[name="class_name"]').addEventListener('change', function() {
        const className = this.value;
        if (className) {
            fetch(`/api/students/?class=${encodeURIComponent(className)}`)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('attendance-list');
                    let html = `<h4 class="font-headline-md text-xl text-secondary mb-4 font-['EB_Garamond']">Mark Attendance</h4>`;
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
                    data.forEach(student => {
                        html += `
                            <div class="bg-surface-container-highest/30 p-4 rounded-xl border border-white/5">
                                <div class="text-on-surface font-semibold">${student.name}</div>
                                <div class="text-on-surface-variant text-xs">${student.student_id}</div>
                                <div class="mt-3 flex gap-3">
                                    <label class="flex items-center gap-2 text-green-400">
                                        <input type="radio" name="attendance_${student.id}" value="present" checked>
                                        Present
                                    </label>
                                    <label class="flex items-center gap-2 text-red-400">
                                        <input type="radio" name="attendance_${student.id}" value="absent">
                                        Absent
                                    </label>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    container.innerHTML = html;
                });
        }
    });
</script>
{% endblock %}
