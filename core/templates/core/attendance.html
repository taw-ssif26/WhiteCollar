{% extends 'core/base.html' %}

{% block title %}Mark Attendance{% endblock %}
{% load static %}
{% block content %}
<div class="min-h-screen py-12 px-4 md:px-12 lg:px-16 max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
        <h1 class="font-display-lg text-3xl md:text-4xl text-secondary font-['EB_Garamond']">Mark Attendance</h1>
        <a href="{% url 'admin_dashboard' %}" class="glass-card px-6 py-2 rounded-full text-sm hover:border-secondary transition-all">Back</a>
    </div>

    <div class="glass-card p-8 rounded-2xl">
        <form method="POST" id="attendanceForm" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="font-label-caps text-xs text-secondary block mb-2">DATE *</label>
                    <input type="date" name="date" id="attendanceDate" value="{{ today|date:'Y-m-d' }}" required 
                           class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none">
                </div>
                <div>
                    <label class="font-label-caps text-xs text-secondary block mb-2">CLASS *</label>
                    <select name="class_name" id="classSelect" required 
                            class="w-full bg-surface-container-highest/30 border border-white/10 rounded-xl px-6 py-4 text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none appearance-none">
                        <option value="" class="bg-surface-container-high">Select Class</option>
                        {% for class in classes %}
                        <option value="{{ class.name }}" class="bg-surface-container-high">{{ class.name }} - {{ class.section }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Student List -->
            <div id="studentList" class="mt-6">
                <p class="text-on-surface-variant text-center py-8">Select a class to load students</p>
            </div>

            <!-- SMS Option -->
            <div class="flex items-center gap-4 bg-secondary/5 p-4 rounded-xl border border-white/5">
                <label class="flex items-center gap-2 text-on-surface-variant cursor-pointer">
                    <input type="checkbox" name="send_sms" id="sendSms" checked class="rounded border-white/10 bg-surface-container-highest/30">
                    <span class="text-sm">Send SMS to absent students</span>
                </label>
                <span class="text-on-surface-variant text-xs" id="absentCount">0 students will receive SMS</span>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-secondary text-on-secondary py-4 rounded-xl font-label-caps text-sm font-bold tracking-[0.2em] hover:shadow-[0_0_30px_rgba(233,193,118,0.4)] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                SUBMIT ATTENDANCE
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('classSelect').addEventListener('change', function() {
    const className = this.value;
    const container = document.getElementById('studentList');
    const submitBtn = document.getElementById('submitBtn');
    
    if (!className) {
        container.innerHTML = '<p class="text-on-surface-variant text-center py-8">Select a class to load students</p>';
        return;
    }
    
    submitBtn.disabled = true;
    container.innerHTML = '<div class="text-center py-8"><div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-secondary border-t-transparent"></div><p class="text-on-surface-variant mt-2">Loading students...</p></div>';
    
    fetch(`/api/students/?class=${encodeURIComponent(className)}`)
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            let html = `
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-headline-md text-xl text-secondary font-['EB_Garamond']">Mark Absent Students</h4>
                    <div class="flex gap-3">
                        <button type="button" onclick="selectAll()" class="text-secondary text-sm hover:underline">Select All</button>
                        <button type="button" onclick="deselectAll()" class="text-on-surface-variant text-sm hover:text-secondary hover:underline">Deselect All</button>
                    </div>
                </div>
                <div class="text-on-surface-variant text-sm mb-4">
                    <span class="text-secondary">ℹ️</span> Only check students who are <span class="text-red-400 font-bold">ABSENT</span>. All others will be marked present.
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            `;
            
            if (data.length === 0) {
                html += `<p class="text-on-surface-variant col-span-full text-center">No students in this class.</p>`;
            } else {
                data.forEach(student => {
                    html += `
                        <div class="bg-surface-container-highest/30 p-4 rounded-xl border border-white/5 hover:border-secondary/30 transition-all">
                            <div class="flex items-start gap-3">
                                <input type="checkbox" name="absent_${student.id}" value="${student.id}" 
                                       class="mt-1 rounded border-white/10 bg-surface-container-highest/30 text-secondary focus:ring-secondary"
                                       onchange="updateAbsentCount()">
                                <div>
                                    <div class="text-on-surface font-semibold">${student.name}</div>
                                    <div class="text-on-surface-variant text-xs">${student.student_id} | Roll: ${student.roll}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `</div>`;
            container.innerHTML = html;
            submitBtn.disabled = false;
            updateAbsentCount();
        })
        .catch(error => {
            console.error('Error:', error);
            container.innerHTML = '<p class="text-red-400 text-center py-8">Error loading students. Please try again.</p>';
            submitBtn.disabled = false;
        });
});

function updateAbsentCount() {
    const checkboxes = document.querySelectorAll('input[name^="absent_"]:checked');
    const count = checkboxes.length;
    document.getElementById('absentCount').textContent = `${count} student${count !== 1 ? 's' : ''} will receive SMS`;
}

function selectAll() {
    document.querySelectorAll('input[name^="absent_"]').forEach(cb => cb.checked = true);
    updateAbsentCount();
}

function deselectAll() {
    document.querySelectorAll('input[name^="absent_"]').forEach(cb => cb.checked = false);
    updateAbsentCount();
}

// Update count on page load
document.addEventListener('DOMContentLoaded', function() {
    // Set today's date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('attendanceDate').value = today;
});
</script>
<script src="{% static 'js/particles.js' %}"></script>
{% endblock %}
