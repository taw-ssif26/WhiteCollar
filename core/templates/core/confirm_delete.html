{% extends 'core/base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="glass-card p-8 md:p-12 rounded-3xl max-w-md w-full text-center">
        <span class="material-symbols-outlined text-6xl text-red-400 mb-4">warning</span>
        <h2 class="font-display-lg text-2xl text-secondary font-['EB_Garamond']">Confirm Delete</h2>
        <p class="text-on-surface-variant mt-4">
            Are you sure you want to delete this <strong>{{ type }}</strong>?
        </p>
        <p class="text-on-surface mt-2">{{ object }}</p>
        
        <form method="POST" class="mt-6 flex gap-4 justify-center">
            {% csrf_token %}
            <a href="{{ request.META.HTTP_REFERER }}" class="glass-card px-8 py-3 rounded-full text-sm hover:border-secondary transition-all">
                Cancel
            </a>
            <button type="submit" class="bg-red-500 text-white px-8 py-3 rounded-full text-sm font-bold hover:bg-red-600 transition-all">
                Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
