# render.yaml
services:
  - type: web
    name: elite-english
    runtime: docker  # ← CHANGE THIS to docker
    plan: free
    dockerfilePath: ./Dockerfile  # ← ADD THIS
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elite-english-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: elite-english-db
    plan: free
